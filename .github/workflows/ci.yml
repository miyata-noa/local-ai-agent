name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: flake8
        run: flake8 agent/ tests/

      - name: mypy
        run: mypy agent/

      - name: pytest
        env:
          USE_MOCK: "1"   # OllamaなしでCIを通す
        run: pytest --cov=agent tests/
